<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="Images/logo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Visual gallery styles */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            aspect-ratio: 4 / 3;
            cursor: pointer;
            group: project;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.2));
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .view-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            transform: translateY(20px);
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .gallery-item:hover .view-btn {
            transform: translateY(0);
        }

        .view-btn:hover {
            background: var(--bg-white);
            color: var(--accent);
        }

        .load-more-container {
            text-align: center;
            margin-top: 50px;
        }

        .btn-load-more {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-load-more:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 15px rgba(30, 58, 138, 0.3);
        }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 80%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .close-modal:hover,
        .close-modal:focus {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        /* Modal Navigation */
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 50%;
            transition: 0.3s;
            z-index: 1001;
        }

        .modal-nav:hover {
            background: var(--accent);
        }

        .modal-nav.prev {
            left: 20px;
        }

        .modal-nav.next {
            right: 20px;
        }

        /* Support for video in gallery */
        .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover video {
            transform: scale(1.1);
        }
        
        .modal-media-container {
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 80%;
            max-height: 80vh;
            animation: zoomIn 0.3s ease;
        }
        .modal-media-container img, .modal-media-container video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

    <!-- Image/Video Modal -->
    <div id="imageModal" class="modal" style="display: none; align-items: center; justify-content: center;">
        <span class="close-modal">&times;</span>
        <button class="modal-nav prev" id="modalPrev"><i class="fas fa-chevron-left"></i></button>
        <button class="modal-nav next" id="modalNext"><i class="fas fa-chevron-right"></i></button>
        <div class="modal-media-container" id="modalMediaContainer"></div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const galleryItems = Array.from(document.querySelectorAll(".gallery-item"));
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            const itemsPerPage = 9;
            let visibleItems = itemsPerPage;

            // Initial hide logic
            galleryItems.forEach((item, index) => {
                if (index >= visibleItems) {
                    item.style.display = 'none';
                }
            });

            if (galleryItems.length <= visibleItems) {
                loadMoreBtn.parentElement.style.display = 'none';
            }

            // Load More Logic
            loadMoreBtn.addEventListener('click', () => {
                const btn = loadMoreBtn;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
                
                setTimeout(() => {
                    visibleItems += itemsPerPage;
                    galleryItems.forEach((item, index) => {
                        if (index < visibleItems) {
                            item.style.display = 'block';
                        }
                    });
                    
                    btn.innerHTML = 'Load More Projects';
                    
                    if (visibleItems >= galleryItems.length) {
                        btn.parentElement.style.display = 'none';
                    }
                }, 600);
            });

            // Modal Logic
            const modal = document.getElementById("imageModal");
            const mediaContainer = document.getElementById("modalMediaContainer");
            const closeModal = document.querySelector(".close-modal");
            const btnPrev = document.getElementById("modalPrev");
            const btnNext = document.getElementById("modalNext");
            let currentIndex = 0;

            function showMedia(index) {
                mediaContainer.innerHTML = ''; // Clear current
                const item = galleryItems[index];
                const img = item.querySelector("img");
                const video = item.querySelector("video");
                
                if (img) {
                    const newImg = document.createElement("img");
                    newImg.src = img.src;
                    mediaContainer.appendChild(newImg);
                } else if (video) {
                    const newVid = document.createElement("video");
                    newVid.src = video.src;
                    newVid.controls = true;
                    newVid.autoplay = true;
                    mediaContainer.appendChild(newVid);
                }
            }

            galleryItems.forEach((item, index) => {
                item.addEventListener("click", function () {
                    currentIndex = index;
                    modal.style.display = "flex";
                    showMedia(currentIndex);
                    document.body.style.overflow = "hidden";
                });
            });

            btnPrev.addEventListener('click', (e) => {
                e.stopPropagation();
                currentIndex = (currentIndex > 0) ? currentIndex - 1 : galleryItems.length - 1;
                showMedia(currentIndex);
            });

            btnNext.addEventListener('click', (e) => {
                e.stopPropagation();
                currentIndex = (currentIndex < galleryItems.length - 1) ? currentIndex + 1 : 0;
                showMedia(currentIndex);
            });

            closeModal.addEventListener("click", function () {
                modal.style.display = "none";
                document.body.style.overflow = "auto";
                mediaContainer.innerHTML = ''; // Stop video playback
            });

            // Close modal when clicking outside the media
            modal.addEventListener("click", function (e) {
                if (e.target === modal || e.target === mediaContainer) {
                    modal.style.display = "none";
                    document.body.style.overflow = "auto";
                    mediaContainer.innerHTML = '';
                }
            });
        });
    </script>
